<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Food Log</title>
  <link rel="stylesheet" href="styles.css?v=20260716a">
</head>
<body>
  <header>
    <h1>Food Log</h1>
  </header>

  <nav class="tab-nav" aria-label="Main sections">
    <button class="tab-button active" type="button" data-tab="diaryPanel">Today</button>
    <button class="tab-button" type="button" data-tab="historyPanel">History</button>
    <button class="tab-button" type="button" data-tab="recipesPanel">Recipes</button>
    <button class="tab-button" type="button" data-tab="ingredientsPanel">Foods</button>
    <button class="tab-button" type="button" data-tab="builderPanel">New</button>
  </nav>

  <main>
    <section id="diaryPanel" class="tab-panel active">
      <div class="day-bar">
        <button id="dayPrev" class="icon-btn" type="button" aria-label="Previous day">‹</button>
        <input id="trackerDate" type="date">
        <button id="dayNext" class="icon-btn" type="button" aria-label="Next day">›</button>
      </div>

      <section class="card summary-card">
        <div class="cal-summary">
          <div id="calRing" class="cal-ring" style="--pct:0">
            <div class="cal-ring-inner">
              <strong id="calRemaining">0</strong>
              <span id="calRemainingLabel">left</span>
            </div>
          </div>
          <div class="cal-figures">
            <div class="cal-fig"><span>Eaten</span><b id="calConsumed">0</b></div>
            <div class="cal-fig"><span>Goal</span><b id="calTarget">0</b></div>
            <button id="editGoals" class="link-btn" type="button">Edit goals</button>
          </div>
        </div>
        <div id="macroBars" class="macro-bars"></div>
      </section>

      <div id="goalsPanel" class="card goals-panel hidden">
        <div class="target-grid">
          <label>Calories <input id="targetCalories" type="number" min="0" step="10"></label>
          <label>Protein <input id="targetProtein" type="number" min="0" step="1"></label>
          <label>Carbs <input id="targetCarbs" type="number" min="0" step="1"></label>
          <label>Fat <input id="targetFat" type="number" min="0" step="1"></label>
          <label>Fibre <input id="targetFibre" type="number" min="0" step="1"></label>
        </div>
      </div>

      <section class="card add-card">
        <div class="add-row">
          <input id="manualName" type="text" placeholder="Add food…">
          <input id="manualCalories" type="number" min="0" step="1" placeholder="kcal">
          <button id="addManualEntry" type="button">Add</button>
        </div>
        <div id="recentFoods" class="recents hidden"></div>
        <details class="more-macros">
          <summary>More macros</summary>
          <div class="manual-grid">
            <input id="manualProtein" type="number" min="0" step="0.1" placeholder="protein">
            <input id="manualCarbs" type="number" min="0" step="0.1" placeholder="carbs">
            <input id="manualFat" type="number" min="0" step="0.1" placeholder="fat">
            <input id="manualFibre" type="number" min="0" step="0.1" placeholder="fibre">
            <input id="manualAddedSugar" type="number" min="0" step="0.1" placeholder="added sugar">
            <input id="manualNaturalSugar" type="number" min="0" step="0.1" placeholder="natural sugar">
          </div>
        </details>
      </section>

      <div id="dailyEntries" class="entry-list"></div>
    </section>

    <section id="historyPanel" class="tab-panel history-panel">
      <div class="section-heading">
        <h2>History</h2>
        <input id="historyDate" type="date">
      </div>
      <div class="history-controls">
        <button id="historyPrev" type="button">‹</button>
        <button id="historyToday" type="button">Today</button>
        <button id="historyNext" type="button">›</button>
      </div>
      <div id="historyTotals" class="macro-line"></div>
      <div id="historyWeeklyAverage" class="weekly-average"></div>
      <div id="historyChart" class="bar-chart"></div>
      <div id="historyEntries" class="entry-list"></div>
    </section>

    <section id="recipesPanel" class="tab-panel">
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search recipes...">
        <select id="tagFilter">
          <option value="">All tags</option>
        </select>
      </div>
      <section id="recipeGrid" class="grid"></section>
    </section>

    <section id="ingredientsPanel" class="tab-panel ingredient-calculator">
      <h2>Ingredients</h2>
      <input id="ingredientSearch" type="search" placeholder="Search ingredients...">
      <div class="calc-row">
        <select id="ingredientSelect"></select>
        <input id="ingredientAmount" type="number" value="100" min="0" step="1">
        <span id="ingredientUnit">g</span>
        <button id="addIngredientToDay" type="button">Add</button>
      </div>
      <div id="ingredientResult" class="macro-line"></div>
    </section>

    <section id="builderPanel" class="tab-panel recipe-builder">
      <h2>New recipe</h2>
      <input id="newRecipeName" type="text" placeholder="Recipe name">
      <input id="newRecipeTags" type="text" placeholder="Tags, separated by commas">
      <div class="builder-row">
        <input id="newRecipeIngredientSearch" list="ingredientDatalist" type="search" placeholder="Search ingredient">
        <input id="newRecipeIngredientAmount" type="number" min="0" step="1" value="100">
        <button id="addBuilderIngredient" type="button">Add</button>
      </div>
      <div id="builderIngredients" class="entry-list"></div>
      <div id="builderTotals" class="macro-line"></div>
      <textarea id="newRecipeMethod" rows="4" placeholder="Method, one step per line"></textarea>
      <button id="saveNewRecipe" type="button">Save</button>
    </section>

    <datalist id="ingredientDatalist"></datalist>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="enhancements.js?v=20260716a"></script>
  <script src="app.js?v=20260716a"></script>
  <script src="daily-food-picker.js?v=20260716c"></script>
</body>
</html>
